<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AchieveX - Account Setting</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="account.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Prompt:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="navbar">
    <div class="header-left">
      <div class="logo">
        <a href="index.html"><img src="assets/gambar/icon.png" alt="Logo AchieveX" /></a>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <div class="divider"></div>
        <a href="bookmark.html">Bookmark</a>
        <div class="divider"></div>
        <a href="#">Other</a>
      </nav>
    </div>

    <div class="nav-icons">
      <div class="search-container">
        <input type="text" placeholder="Cari komik..." class="search-input" />
        <img src="assets/gambar/search.png" alt="Search" class="icon-small" />
      </div>
      <div class="divider"></div>
      <a href="account.html"><img src="assets/gambar/Setting.png" alt="Settings" class="icon-small" /></a>
    </div>
  </header>

  <main class="account-container">
    <div class="account-card">
      <h1 class="setting-title">Account Setting</h1>
      
      <div class="profile-pic">
        <img src="assets/gambar/poto-profil.png" alt="Profile Picture" />
      </div>

      <div class="user-info">
        <div class="info-row">
          <span class="label">Name</span>
          <span class="colon">:</span>
          <span class="value">Singgit5</span>
        </div>
        <div class="info-row">
          <span class="label">E-Mail</span>
          <span class="colon">:</span>
          <span class="value">kusuka4951@gmail.com</span>
        </div>
        <div class="info-row">
          <span class="label">Password</span>
          <span class="colon">:</span>
          <span class="value password-dots">••••••••</span>
        </div>
      </div>

      <button class="btn-logout" onclick="alert('Logged Out!')">
        <img src="assets/gambar/logout-icon.png" alt="" class="logout-icon">
        Logout
      </button>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 AchieveX. All Rights Reserved.</p>
  </footer>

</body>
</html>
