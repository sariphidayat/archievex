<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchieveX - Account Setting</title>
    
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="assets/css/account.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Prompt:wght@700&display=swap" rel="stylesheet">
    <script defer src="assets/js/alpine.min.js"></script>
</head>
<body x-data="accountApp()" x-init="init()" class="bg-[#2a244d]">

    <header
        class="fixed top-0 z-[100] w-full h-16 md:h-20 bg-[#FFF8EE] flex items-center justify-between px-4 md:px-10 shadow-lg">
        <div class="flex items-center gap-6">
            <a href="index.html" class="flex items-center">
                <img src="assets/gambar/icon.png"
                    class="w-[150px] sm:-ml-6 md:ml-0 md:w-[220px] h-auto object-contain block scale-125 origin-left" alt="Logo" />
            </a>

            <nav id="mobile-menu" :class="{'hidden': !mobileMenuOpen, 'flex': mobileMenuOpen}"
                class="absolute top-16 left-0 w-full bg-[#FFF8EE] flex-col p-4 gap-4 shadow-lg md:static md:flex md:flex-row md:w-auto md:p-0 md:shadow-none md:top-auto text-[#333333] font-semibold text-sm">
                <a href="index.html" class="hover:text-purple-600 transition">Home</a>
                <div class="hidden md:block w-px h-4 bg-gray-300"></div>
                <a href="bookmark.html" class="hover:text-purple-600 transition">Bookmark</a>
                <div class="hidden md:block w-px h-4 bg-gray-300"></div>
                <a href="about.html" class="hover:text-purple-600 transition">About</a>
                <a :href="isAuthenticated() ? 'account.html' : 'auth.html'" class="md:hidden hover:text-purple-600 transition"><span x-text="isAuthenticated() ? 'Account' : 'Login'"></span></a>
            </nav>
        </div>

        <div class="flex items-center gap-4">
            <template x-if="!isAuthenticated()">
                <a href="auth.html" class="hidden md:inline text-sm font-semibold text-[#333] hover:text-purple-600 transition">Login</a>
            </template>
            <template x-if="isAuthenticated()">
                <a href="account.html"><img src="assets/gambar/Setting.png" class="w-6 h-6 opacity-80 hover:opacity-100 transition" alt="Settings"></a>
            </template>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden flex flex-col gap-1">
                <div class="w-6 h-0.5 bg-gray-800"></div>
                <div class="w-6 h-0.5 bg-gray-800"></div>
                <div class="w-6 h-0.5 bg-gray-800"></div>
            </button>
        </div>
    </header>

    <main class="account-container py-24">
        <div class="account-card">
            <button class="btn-back" onclick="history.back()">
                <span>&#10094;</span> Kembali
            </button>

            <h1 class="setting-title">Account Setting</h1>

            <template x-if="!isLoggedIn">
                <div class="py-10 text-center">
                    <p class="text-white/70 mb-4">Anda belum login.</p>
                    <a href="auth.html" class="inline-block bg-[#897FA4] text-white px-6 py-3 rounded-full font-semibold hover:bg-[#6f62a0] transition">Login / Daftar</a>
                </div>
            </template>

            <template x-if="isLoggedIn && loading">
                <div class="py-10 text-center text-white/50">Memuat profil...</div>
            </template>

            <template x-if="isLoggedIn && !loading && user">
                <div>
                    <div class="profile-pic">
                        <img src="assets/gambar/poto profil.png" alt="Profile Picture" />
                    </div>

                    <div class="user-info">
                        <div class="info-row">
                            <span class="label">Username</span>
                            <span class="colon">:</span>
                            <span class="value" x-text="user.username"></span>
                        </div>
                        <div class="info-row">
                            <span class="label">E-Mail</span>
                            <span class="colon">:</span>
                            <span class="value" x-text="user.email"></span>
                        </div>
                        <div class="info-row">
                            <span class="label">Role</span>
                            <span class="colon">:</span>
                            <span class="value capitalize" x-text="user.role"></span>
                        </div>
                        <div class="info-row">
                            <span class="label">Status</span>
                            <span class="colon">:</span>
                            <span class="value" x-text="user.is_active ? 'Aktif' : 'Nonaktif'"></span>
                        </div>
                        <div class="info-row">
                            <span class="label">Password</span>
                            <span class="colon">:</span>
                            <span class="value password-dots">••••••••</span>
                        </div>
                    </div>

                    <button class="btn-logout" @click="doLogout()">
                        <img src="assets/gambar/Combined-Shape.png" alt="Logout Icon" class="logout-icon">
                        <span x-text="loggingOut ? 'Memproses...' : 'Logout'"></span>
                    </button>
                </div>
            </template>

            <template x-if="isLoggedIn && !loading && !user && error">
                <div class="py-10 text-center">
                    <p class="text-red-400 mb-4" x-text="error"></p>
                    <button @click="init()" class="bg-[#897FA4] text-white px-6 py-3 rounded-full font-semibold hover:bg-[#6f62a0] transition">Coba Lagi</button>
                </div>
            </template>
        </div>
        <!-- <footer class="pt-10 text-center text-white/30 text-[10px] tracking-widest uppercase">
            © 2026 ArchieveX. All Rights Reserved.
        </footer> -->
    </main>

    <footer class="footer text-center text-white/30 text-xs p-10">
        <p>&copy; 2026 ArchieveX. All Rights Reserved.</p>
    </footer>

    <script src="assets/js/auth.js"></script>
    <script>
        function accountApp() {
            return {
                isLoggedIn: false,
                loading: true,
                loggingOut: false,
                user: null,
                error: '',
                mobileMenuOpen: false,

                async init() {
                    this.isLoggedIn = isAuthenticated();
                    if (!this.isLoggedIn) {
                        this.loading = false;
                        return;
                    }
                    await this.loadProfile();
                },

                async loadProfile() {
                    this.loading = true;
                    this.error = '';
                    try {
                        const res = await fetch(`${API_BASE}/auth/me`, {
                            headers: getAuthHeaders(),
                        });
                        if (!res.ok) {
                            if (res.status === 401) {
                                clearAuth();
                                this.isLoggedIn = false;
                            } else {
                                this.error = 'Gagal memuat profil.';
                            }
                            this.loading = false;
                            return;
                        }
                        this.user = await res.json();
                        localStorage.setItem(USER_KEY, JSON.stringify(this.user));
                    } catch (_) {
                        this.error = 'Tidak dapat terhubung ke server.';
                    } finally {
                        this.loading = false;
                    }
                },

                async doLogout() {
                    this.loggingOut = true;
                    await logoutUser();
                    this.isLoggedIn = false;
                    this.user = null;
                    this.loggingOut = false;
                    window.location.href = 'auth.html';
                },
            };
        }
    </script>
</body>
</html>
