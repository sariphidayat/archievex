<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AchieveX - Bookmarks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Prompt:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .font-prompt { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-[#2a244d] text-white min-h-screen flex flex-col">

    <header class="fixed top-0 z-[100] w-full h-16 md:h-20 bg-[#FFF8EE] flex items-center justify-between px-4 md:px-10 shadow-lg">
        <div class="flex items-center gap-6">
            <a href="index.html" class="flex items-center">
                <img src="assets/gambar/icon.png" 
                class="w-[150px] md:w-[220px] h-auto object-contain block scale-125 origin-left" 
                alt="Logo">
            </a>
        
            <nav id="mobile-menu" class="hidden absolute top-16 left-0 w-full bg-[#FFF8EE] flex-col p-4 gap-4 shadow-lg md:static md:flex md:flex-row md:w-auto md:p-0 md:shadow-none md:top-auto text-[#333333] font-semibold text-sm">
                <a href="index.html" class="hover:text-purple-600 transition">Home</a>
                <div class="hidden md:block w-px h-4 bg-gray-300"></div>
                <a href="bookmark.html" class="hover:text-purple-600 transition">Bookmark</a>
                <div class="hidden md:block w-px h-4 bg-gray-300"></div>
                <a href="#" class="hover:text-purple-600 transition">Other</a>
            </nav>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center bg-white px-3 py-1 rounded-full border border-gray-200">
                <input type="text" id="search-input" placeholder="Cari bookmark..." class="bg-transparent outline-none text-xs w-24 md:w-32 text-gray-700">
                <img src="assets/gambar/search.png" class="w-4 h-4 opacity-40" alt="Search">
            </div>
            <a href="account.html"><img src="assets/gambar/Setting.png" class="w-6 h-6 opacity-80" alt="Settings"></a>
        
            <button onclick="toggleMenu()" class="md:hidden flex flex-col gap-1">
                <div class="w-6 h-0.5 bg-gray-800"></div>
                <div class="w-6 h-0.5 bg-gray-800"></div>
                <div class="w-6 h-0.5 bg-gray-800"></div>
            </button>
        </div>
    </header>

    <main class="flex-grow flex justify-center p-4 md:p-10 pt-24 md:pt-32"> <div class="bg-[#5A527A] w-full max-w-[1100px] min-h-[500px] rounded-[30px] md:rounded-[40px] p-6 md:p-10 flex flex-col items-center shadow-2xl border border-white/10">
            
            <h2 class="font-prompt text-[#FFD700] text-lg md:text-2xl font-bold tracking-widest uppercase border-b-2 border-[#FFD700] pb-2 mb-10 text-center">
                BOOKMARK KAMU
            </h2>

            <div class="w-full flex-grow">
                <div id="empty-state" class="hidden flex flex-col items-center justify-center text-center py-20">
                    <h1 class="text-xl md:text-3xl font-bold mb-2">Kamu Belum Membuat Bookmark...</h1>
                    <p class="text-white/50 text-xs md:text-base mb-6">Cari komik favoritmu sekarang!</p>
                    <a href="index.html" class="bg-[#FFD700] text-[#2a244d] px-6 py-2 rounded-full font-bold text-sm hover:scale-105 transition">Cari Komik</a>
                </div>

                <div id="bookmark-list" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 w-full"></div>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center text-white/30 text-xs">
        © 2026 AchieveX. All Rights Reserved.
    </footer>

    <script>
        const searchInput = document.getElementById('search-input');
        const listContainer = document.getElementById('bookmark-list');
        const emptyState = document.getElementById('empty-state');

        const toggleMenu = () => {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        };

        function renderBookmarks(data = null) {
            const bookmarks = data !== null ? data : (JSON.parse(localStorage.getItem('myBookmarks')) || []);

            if (bookmarks.length === 0) {
                listContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            listContainer.classList.remove('hidden');
            listContainer.classList.add('grid');
            listContainer.innerHTML = '';

            bookmarks.forEach((comic, index) => {
                // Buat card bookmark
                listContainer.innerHTML += `
                    <div class="relative bg-[#3B3267] rounded-xl overflow-hidden border border-white/5 transition-all hover:border-[#FFD700]/50 hover:-translate-y-1 shadow-md group">
                        <a href="${comic.link}">
                            <img src="${comic.image}" class="w-full aspect-[3/4] object-cover block group-hover:brightness-110 transition">
                            <div class="p-2 md:p-3 text-center">
                                <h3 class="text-[#FFD700] text-[10px] md:text-sm font-bold truncate">${comic.title}</h3>
                                <p class="text-[#FFD700]/70 text-[9px] md:text-xs italic truncate">${comic.subtitle}</p>
                            </div>
                        </a>
                        <button onclick="removeBookmark(event, ${index})" 
                            class="absolute top-2 right-2 bg-red-500 hover:bg-red-600 text-white text-[8px] md:text-[10px] font-bold px-2 py-1 rounded shadow-lg z-10 transition">
                            HAPUS
                        </button>
                    </div>`;
            });
        }   

        // Fitur Search
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const allBookmarks = JSON.parse(localStorage.getItem('myBookmarks')) || [];
            const filtered = allBookmarks.filter(c => 
                c.title.toLowerCase().includes(keyword) || 
                c.subtitle.toLowerCase().includes(keyword)
            );
            renderBookmarks(filtered);
        });

        // Fitur Hapus
        function removeBookmark(event, index) {
            event.preventDefault();
            event.stopPropagation(); // Mencegah klik tembus ke link komik
            
            let bookmarks = JSON.parse(localStorage.getItem('myBookmarks')) || [];
            bookmarks.splice(index, 1);
            localStorage.setItem('myBookmarks', JSON.stringify(bookmarks));
            
            // Re-render
            const currentSearch = searchInput.value;
            if (currentSearch) {
                const filtered = bookmarks.filter(c => 
                    c.title.toLowerCase().includes(currentSearch.toLowerCase())
                );
                renderBookmarks(filtered);
            } else {
                renderBookmarks();
            }
        }

        document.addEventListener('DOMContentLoaded', () => renderBookmarks());
    </script>
</body>
</html>
