<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchieveX - Baca Komik Favoritmu</title>
    <link rel="stylesheet" href="assets/css/index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Prompt:wght@700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="assets/js/alpine.min.js"></script>
</head>

<body x-data="myApp()" x-init="init()">

    <header
        class="fixed top-0 z-[100] w-full h-16 md:h-20 bg-[#FFF8EE] flex items-center justify-between px-4 md:px-10 shadow-lg">
        <div class="flex items-center gap-6">
            <a href="index.html" class="flex items-center">
                <img src="assets/gambar/icon.png"
                    class="w-[150px] md:w-[220px] h-auto object-contain block scale-125 origin-left" alt="Logo" />
            </a>

            <nav id="mobile-menu" :class="{'hidden': !mobileMenuOpen, 'flex': mobileMenuOpen}"
                class="absolute top-16 left-0 w-full bg-[#FFF8EE] flex-col p-4 gap-4 shadow-lg md:static md:flex md:flex-row md:w-auto md:p-0 md:shadow-none md:top-auto text-[#333333] font-semibold text-sm">
                <a href="index.html" class="hover:text-purple-600 transition">Home</a>
                <div class="hidden md:block w-px h-4 bg-gray-300"></div>
                <a href="bookmark.html" class="hover:text-purple-600 transition">Bookmark</a>
                <div class="hidden md:block w-px h-4 bg-gray-300"></div>
                <a href="#" class="hover:text-purple-600 transition">Other</a>
            </nav>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center bg-white px-3 py-1 rounded-full border border-gray-200">
                <input type="text" id="search-input" placeholder="Cari bookmark..."
                    class="bg-transparent outline-none text-xs w-24 md:w-32 text-gray-700">
                <img src="assets/gambar/search.png" class="w-4 h-4 opacity-40" alt="Search">
            </div>
            <a href="account.html"><img src="assets/gambar/Setting.png" class="w-6 h-6 opacity-80" alt="Settings"></a>

            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden flex flex-col gap-1">
                <div class="w-6 h-0.5 bg-gray-800"></div>
                <div class="w-6 h-0.5 bg-gray-800"></div>
                <div class="w-6 h-0.5 bg-gray-800"></div>
            </button>
        </div>
    </header>

    <section class="hero-wrapper">
        <div id="banner-slider">
            <button class="btn-slider prev" @click="manualMove(-1)">&#10094;</button>
            <button class="btn-slider next" @click="manualMove(1)">&#10095;</button>

            <div class="slider-track" id="sliderTrack">
                <div class="slide">
                    <img src="assets/gambar/slider.png" alt="Featured Stories Banner">
                    <div class="hero-text">
                        <h1>Read Your<br>Favorite Stories</h1>
                        <p>Koleksi komik terbaru dan terlengkap dalam satu genggaman. Nikmati pengalaman baca yang
                            mulus.</p>
                        <a href="orv.html" class="btn-start" style="text-decoration: none; display: inline-block;">Start
                            Reading</a>
                    </div>
                </div>
                <div class="slide"><img src="assets/gambar/bannerfr.jpg" alt="Frieren Banner"></div>
                <div class="slide"><img src="assets/gambar/bannerorv.jpg" alt="ORV Banner"></div>
            </div>
        </div>
    </section>

    <section class="music-section">
        <div class="music-card">
            <audio id="audioORV" preload="metadata">
                <source src="assets/musik/orv_theme.mp3" type="audio/mpeg">
            </audio>
            <div class="music-info">
                <p>Lagu Skenario</p>
                <span>Omniscient Reader's Viewpoint</span>
            </div>
            <button id="btnORV" @click="togglePlayPause('audioORV', 'btnORV')" class="btn-play-custom"></button>
        </div>

        <div class="music-card">
            <audio id="audioFrieren" preload="metadata">
                <source src="assets/musik/fren_theme.mpeg" type="audio/mpeg">
            </audio>
            <div class="music-info">
                <p>Audio Perjalanan</p>
                <span>Frieren: Beyond Journey's End</span>
            </div>
            <button id="btnFrieren" @click="togglePlayPause('audioFrieren', 'btnFrieren')"
                class="btn-play-custom"></button>
            <!-- <button id="btnFrieren" @click="console.log('test')" class="btn-play-custom"></button> -->
        </div>
    </section>

    <main class="comic-container">
        <div class="comic-grid">

            <template x-for="comic in comics" :key="comic.id">
                <a :href="'detail.html?id=' + comic.id" class="card" style="text-decoration: none;">
                    <div class="card-image">
                        <img :src="comic.picture" class="cover" :alt="'Cover ' + comic.title" loading="lazy" />
                        <img :src="'assets/gambar/' + comic.country.flag" class="flag" :alt="comic.country.name + ' Flag'" />
                    </div>
                    <div class="card-info">
                        <h2 x-text="comic.title"></h2>
                        <span class="btn-chapter" x-text="'Chapter ' + comic.chapters.end"></span>
                    </div>
                </a>
            </template>

        </div>
    </main>

    <footer class="footer text-center text-black/30 text-xs p-10">
        <p>© 2026 ArchieveX. All Rights Reserved.</p>
    </footer>

    <script type="text/javascript" src="assets/js/script-alt.js"></script>
</body>

</html>
