<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchieveX - Baca Komik Favoritmu</title>
    <link rel="stylesheet" href="assets/css/index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Prompt:wght@700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="assets/js/alpine.min.js"></script>
</head>

<body x-data="myApp()" x-init="init()">
    <header
        class="fixed top-0 z-[100] h-16 md:h-20 bg-[#FFF8EE] w-full flex items-center justify-between px-4 md:px-10 shadow-lg">
        <div class="flex items-center gap-6">
            <a href="index.html" class="flex items-center">
                <img src="assets/gambar/icon.png"
                    class="w-[150px] md:w-[220px] h-auto object-contain block scale-125 origin-left" alt="Logo" />
            </a>

            <nav id="mobile-menu" :class="{'hidden': !mobileMenuOpen, 'flex': mobileMenuOpen}"
                class="absolute top-16 left-0 w-full bg-[#FFF8EE] flex-col p-4 gap-4 shadow-lg md:static md:flex md:flex-row md:w-auto md:p-0 md:shadow-none md:top-auto text-[#333333] font-semibold text-sm">
                <a href="index.html" class="hover:text-purple-600 transition">Home</a>
                <div class="hidden md:block w-px h-4 bg-gray-300"></div>
                <a href="bookmark.html" class="hover:text-purple-600 transition">Bookmark</a>
                <div class="hidden md:block w-px h-4 bg-gray-300"></div>
                <a href="about.html" class="hover:text-purple-600 transition">About</a>
            </nav>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center bg-white px-3 py-1 rounded-full border border-gray-200">
                <input type="text" id="search-input" x-model="searchQuery" placeholder="Cari komik..."
                    class="bg-transparent outline-none text-xs w-24 md:w-32 text-gray-700">
                <img src="assets/gambar/search.png" class="w-4 h-4 opacity-40" alt="Search">
            </div>
            <template x-if="!isAuthenticated()">
                <a href="auth.html" class="hidden md:inline text-sm font-semibold text-[#333333] hover:text-purple-600 transition">Login</a>
            </template>
            <template x-if="isAuthenticated()">
                <a href="account.html"><img src="assets/gambar/Setting.png" class="w-6 h-6 opacity-80 hover:opacity-100 transition" alt="Settings"></a>
            </template>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden flex flex-col gap-1">
                <div class="w-6 h-0.5 bg-gray-800"></div>
                <div class="w-6 h-0.5 bg-gray-800"></div>
                <div class="w-6 h-0.5 bg-gray-800"></div>
            </button>
        </div>
    </header>

    <section class="hero-wrapper h-[300px] md:h-[350px] overflow-hidden relative">
        <div id="banner-slider" class="h-full w-full">
            <button class="btn-slider prev z-10" @click="manualMove(-1)">&#10094;</button>
            <button class="btn-slider next z-10" @click="manualMove(1)">&#10095;</button>

            <div class="slider-track flex h-full" id="sliderTrack">
                <div class="slide min-w-full h-full relative">
                    <img src="assets/gambar/slider.png" alt="Featured" class="w-full h-full object-cover">
                    <div class="hero-text absolute inset-0 flex flex-col justify-center px-10 bg-black/20">
                        <h1 class="text-2xl md:text-4xl font-bold">Read Your<br>Favorite Stories</h1>
                        <p class="text-sm max-w-md hidden md:block">Koleksi komik terbaru dan terlengkap dalam satu genggaman.</p>
                        <a href="#comic-grid" class="btn-start mt-4 w-fit px-6 py-2 bg-purple-600 rounded-full text-sm">Start Reading</a>
                    </div>
                </div>
            
                <div class="slide min-w-full h-full">
                    <img src="assets/gambar/bannerfr.jpg" alt="Frieren" class="w-full h-full object-cover">
                </div>

                <div class="slide min-w-full h-full">
                    <img src="assets/gambar/bannerorv.jpg" alt="ORV" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </section>

    <main class="comic-container">
        <div class="comic-grid" id="comic-grid">

            <template x-for="comic in comics" :key="comic.id">
                <a x-show="searchQuery === '' || comic.title.toLowerCase().includes(searchQuery.toLowerCase())" :href="'detail.html?id=' + comic.id" class="card" style="text-decoration: none;">
                    <div class="card-image">
                        <img :src="comic.picture" class="cover" :alt="'Cover ' + comic.title" loading="lazy" />
                        <img :src="'assets/gambar/' + comic.country.flag" class="flag" :alt="comic.country.name + ' Flag'" />
                    </div>
                    <div class="card-info">
                        <h2 x-text="comic.title"></h2>
                        <span class="btn-chapter" x-text="'Chapter ' + comic.chapters.end"></span>
                    </div>
                </a>
            </template>

        </div>
    </main>

    <footer class="footer text-center text-black/30 text-xs p-10">
        <p>© 2026 ArchieveX. All Rights Reserved.</p>
    </footer>
    <script type="text/javascript" src="assets/js/auth.js"></script>
    <script type="text/javascript" src="assets/js/script-alt.js"></script>

</body>

</html>
